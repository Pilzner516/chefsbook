<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Red circle background -->
  <circle cx="64" cy="64" r="64" fill="#ce2b37"/>
  <!-- Chef's hat - white -->
  <!-- Hat puffs (top) -->
  <ellipse cx="44" cy="38" rx="16" ry="14" fill="white"/>
  <ellipse cx="64" cy="32" rx="16" ry="14" fill="white"/>
  <ellipse cx="84" cy="38" rx="16" ry="14" fill="white"/>
  <!-- Hat body -->
  <rect x="38" y="40" width="52" height="36" rx="3" fill="white"/>
  <!-- Hat band -->
  <rect x="38" y="72" width="52" height="8" rx="2" fill="#f0f0f0"/>
  <!-- Band line -->
  <line x1="38" y1="76" x2="90" y2="76" stroke="#e0e0e0" stroke-width="1"/>
  <!-- Subtle hat details - vertical lines on body -->
  <line x1="52" y1="44" x2="52" y2="72" stroke="#f5f5f5" stroke-width="1"/>
  <line x1="64" y1="42" x2="64" y2="72" stroke="#f5f5f5" stroke-width="1"/>
  <line x1="76" y1="44" x2="76" y2="72" stroke="#f5f5f5" stroke-width="1"/>
</svg>
